<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>testing</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
  <h1>Simulation Framework</h1>

  <div class="container">
    <div class="panel">
      <h2>Simple Simulation</h2>
      <canvas width="700" height="400" id="simulationCanvas"></canvas>
      <div class="controls">
        <button id="startButton">Start Simulation</button>
        <button id="startWebGPUButton">Start WebGPU (GPU Render)</button>
        <button id="stopButton">Stop Simulation</button>
      </div>
    </div>

    <div class="panel">
      <h2>Performance Benchmark</h2>
      
      <div class="form-group">
        <h3>Agent Configuration</h3>
        <label>
          Start Agent Count:
          <input type="number" id="startAgents" value="1000" min="100" step="100" />
        </label>
        <label>
          End Agent Count:
          <input type="number" id="endAgents" value="10000" min="100" step="100" />
        </label>
        <label>
          Step Size:
          <input type="number" id="stepAgents" value="1000" min="100" step="100" />
        </label>

        <label>
          Custom Agent Counts:
          <textarea id="customAgentCounts" rows="3" placeholder="e.g. 1000, 5000, 20000"></textarea>
        </label>
        <p>Leave blank to use the linear range above. Values must be positive integers.</p>
        
      </div>

      <div class="form-group">
        <h3>Test Configuration</h3>
        <label>
          Frames per Test:
          <input type="number" id="framesPerTest" value="10" min="1" max="100" />
        </label>
        <label>
          <input type="checkbox" id="warmupRun" checked />
          Run warmup frame first
        </label>
      </div>

      <div class="form-group">
        <h3>Methods to Test</h3>
        <label>
          <input type="checkbox" id="methodJavaScript" value="JavaScript" checked />
          JavaScript
        </label>
        <label>
          <input type="checkbox" id="methodWebAssembly" value="WebAssembly" />
          WebAssembly
        </label>
        <label>
          <input type="checkbox" id="methodWebWorkers" value="WebWorkers" />
          WebWorkers
        </label>
        <label>
          <input type="checkbox" id="methodWebGPUCpu" value="WebGPU" />
          WebGPU (CPU render)
        </label>
        <label>
          <input type="checkbox" id="methodWebGPUGpu" value="WebGPU-gpu" />
          WebGPU (GPU render)
        </label>
        <label>
          <input type="checkbox" id="methodWebGL" value="WebGL" />
          WebGL
        </label>
      </div>

      <div class="controls">
        <button id="runBenchmark">Run Benchmark</button>
        <button id="cancelBenchmark" disabled>Cancel</button>
      </div>

      <div id="benchmarkStatus"></div>
      <div id="benchmarkProgress"></div>

      <canvas width="900" height="500" id="benchmarkCanvas"></canvas>
    </div>
  </div>

  <script type="module" src="/src/website.ts"></script>
</body>

</html>
